{% extends "auth/layout_auth.html" %}

{% block title %}SIGECAM - Acceso{% endblock %}

{% block content %}
    <form id="loginForm" class="flex flex-col space-y-5">

        <div class="flex flex-col">
            <label for="nombre_usuario" class="mb-2 text-sm font-semibold text-gray-900">Usuario</label>
            <input type="text" id="nombre_usuario" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#4d2a28] focus:border-transparent transition-all"
                   placeholder="Ingrese su usuario">
        </div>

        <div class="flex flex-col">
            <label for="password" class="mb-2 text-sm font-semibold text-gray-900">Contraseña</label>
            <input type="password" id="password" required
                   class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#4d2a28] focus:border-transparent transition-all"
                   placeholder="Ingrese su contraseña">
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-[#4d2a28] hover:bg-[#381e1d] text-white font-medium py-3 rounded-lg transition-colors duration-200">
                Iniciar Sesión
            </button>
        </div>

        <!--
        <div class="mt-3 text-center">
            <a href="{{ url_for('auth.register_page') }}" class="text-decoration-none text-primary-custom fw-bold" style="font-size: 16px;">¿Nuevo cliente? Regístrate aquí</a>
        </div>
        -->

    </form>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{{ url_for('static', filename='scripts/auth.js') }}"></script>
{% endblock %}
