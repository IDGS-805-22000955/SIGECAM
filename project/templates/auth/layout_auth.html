<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SIGECAM{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-cover bg-center bg-no-repeat bg-fixed font-sans flex items-center justify-center p-4"
      style="background-image: url('{{ url_for('static', filename='img/background.png') }}');">

    <div class="bg-white rounded-[20px] shadow-2xl w-full max-w-[420px] px-8 py-12 flex flex-col items-center">

        <div class="mb-8 flex flex-col items-center text-center">
            <img src="{{ url_for('static', filename='img/sigecam.png') }}"
                 alt="SIGECAM Logo"
                 class="h-28 w-auto mb-4">
            <p class="text-gray-500 text-sm">Sistema de Gestión de Calzado</p>
        </div>

        <div class="w-full">
            {% block content %}{% endblock %}
        </div>

    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
