{% extends "admin/layout_admin.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block header_title %}Registrar Usuario{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="p-6 bg-white border border-gray-200 rounded-lg shadow dark:bg-gray-800 dark:border-gray-700">

        <h4 class="flex items-center text-lg font-bold text-gray-900 dark:text-white mb-6 pb-4 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-shield-lock mr-2 text-blue-600"></i> Credenciales de Acceso
        </h4>

        <form method="POST" action="{{ url_for('admin.users_create') }}">

            <div class="grid gap-6 mb-6 md:grid-cols-2">
                <div>
                    <label for="nombre_usuario" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Nombre de Usuario *</label>
                    <input type="text" id="nombre_usuario" name="nombre_usuario" placeholder="Ej: alvarogmz" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required>
                </div>

                <div>
                    <label for="rol" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Rol Inicial *</label>
                    <select id="rol" name="rol" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required>
                        <option value="Ventas">Ventas</option>
                        <option value="Producción">Producción</option>
                        <option value="Sistemas">Sistemas</option>
                        <option value="Admin">Administrador</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Contraseña Provisional *</label>
                <input type="password" id="password" name="password" placeholder="********" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-200 dark:border-gray-700">
                <a href="{{ url_for('admin.usuarios_list') }}" class="text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-700 dark:hover:border-gray-600 dark:focus:ring-gray-700">
                    Cancelar
                </a>
                <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">
                    Registrar Usuario
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
