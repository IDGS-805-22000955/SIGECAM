{% extends "admin/layout_admin.html" %}
{% block title %}Nuevo Empleado{% endblock %}
{% block header_title %}Registrar Empleado{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="p-8 bg-[#E2E8F0] rounded-2xl shadow-sm">

        <h4 class="flex items-center text-xl font-bold text-gray-900 mb-8 pb-4 border-b border-gray-300">
            <div class="w-10 h-10 bg-[#5D3A3A] text-white rounded-lg flex items-center justify-center mr-3 shadow-sm">
                <i class="bi bi-person-badge"></i>
            </div>
            Información del Empleado
        </h4>

        <form method="POST" action="{{ url_for('admin.users_create') }}">

            <div class="grid gap-6 mb-6 md:grid-cols-2">
                <div>
                    <label for="nombre_usuario" class="block mb-2 text-sm font-semibold text-gray-700">Nombre del Empleado *</label>
                    <input type="text" id="nombre_usuario" name="nombre_usuario" placeholder="Ej: Juan Pérez"
                           class="w-full border-none rounded-xl px-4 py-3 text-sm text-gray-700 focus:ring-2 focus:ring-[#1F3F5E] shadow-sm" required>
                </div>

                <div>
                    <label for="rol" class="block mb-2 text-sm font-semibold text-gray-700">Rol Inicial *</label>
                    <select id="rol" name="rol"
                            class="w-full border-none rounded-xl px-4 py-3 text-sm text-gray-700 focus:ring-2 focus:ring-[#1F3F5E] shadow-sm" required>
                        <option value="Producción">Producción (Operario)</option>
                        <option value="Ventas">Ventas</option>
                        <option value="Sistemas">Sistemas</option>
                        <option value="Admin">Administrador</option>
                    </select>
                </div>
            </div>

            <div class="mb-8">
                <label for="password" class="block mb-2 text-sm font-semibold text-gray-700">Contraseña Provisional *</label>
                <input type="password" id="password" name="password" placeholder="********"
                       class="w-full border-none rounded-xl px-4 py-3 text-sm text-gray-700 focus:ring-2 focus:ring-[#1F3F5E] shadow-sm" required>
            </div>

            <div class="flex items-center justify-end gap-3 pt-6 border-t border-gray-300">
                <a href="{{ url_for('admin.usuarios_list') }}"
                   class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancelar
                </a>
                <button type="submit"
                        class="px-5 py-2.5 text-sm font-medium text-white bg-[#1F3F5E] rounded-lg hover:bg-[#152b40] transition-colors shadow-sm">
                    Registrar Empleado
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
