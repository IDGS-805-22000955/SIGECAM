<div id="modal-create-mp" tabindex="-1" aria-hidden="true" class="fixed top-0 left-0 right-0 z-50 hidden w-full p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative w-full max-w-2xl max-h-full">
        <div class="relative bg-white rounded-2xl shadow-xl border border-gray-100">
            <div class="flex items-center justify-between p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold text-gray-800">Agregar Materia Prima</h3>
                <button type="button" data-modal-hide="modal-cliente" class="text-gray-400 hover:text-gray-900">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>

            <form action="{{ url_for('admin.materiales_create') }}" method="POST" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Nombre *</label>
                        <input type="text" name="nombre" placeholder="Ej. Cuero" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Unidad de Medida *</label>
                        <select name="unidad_medida" required class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                            <option value="Gramos">Gramos</option>
                            <option value="Metros">Metros</option>
                            <option value="Piezas">Piezas</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Stock Actual</label>
                        <input type="number" step="0.01" name="stock_actual" value="0" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Stock Mínimo</label>
                        <input type="number" step="0.01" name="stock_minimo" value="0" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">% Merma</label>
                        <input type="number" step="0.01" name="porcentaje_merma" value="0" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Costo Unitario</label>
                        <input type="number" step="0.01" name="costo_unitario" value="0" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                </div>
                <div class="flex justify-end gap-4 mt-10">
                    <button type="button" data-modal-hide="modal-cliente" class="px-6 py-2.5 text-sm font-bold text-gray-500">Cancelar</button>
                    <button type="submit" class="px-8 py-2.5 bg-[#0f4b5b] text-white text-sm font-bold rounded-xl shadow-md">Guardar Material</button>
                </div>
            </form>
        </div>
    </div>
</div>
