<div id="modal-delete-mp-{{ mp.id_mp }}" tabindex="-1" class="fixed top-0 left-0 right-0 z-50 hidden p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-3xl shadow-xl p-8 text-center border border-gray-100">
            <div class="flex justify-center mb-6">
                <i class="bi bi-exclamation-triangle text-red-500 text-6xl"></i>
            </div>
            <h3 class="mb-8 text-xl font-bold text-gray-800">¿Eliminar material <span class="text-red-600">"{{ mp.nombre }}"</span>?</h3>
            <div class="flex justify-center gap-4">
                <button data-modal-hide="modal-delete-mp-{{ mp.id_mp }}" type="button" class="px-6 py-2.5 text-sm font-bold text-gray-500 bg-gray-100 rounded-full">Cancelar</button>
                <form action="{{ url_for('admin.materiales_delete') }}" method="POST">
                    <input type="hidden" name="id_mp" value="{{ mp.id_mp }}">
                    <button type="submit" class="px-6 py-2.5 text-sm font-bold text-white bg-red-600 rounded-full flex items-center gap-2">
                        <i class="bi bi-trash-fill"></i> Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
