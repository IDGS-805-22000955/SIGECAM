<div id="modal-edit-mp-{{ mp.id_mp }}" tabindex="-1" aria-hidden="true" class="fixed top-0 left-0 right-0 z-50 hidden w-full p-4 overflow-x-hidden overflow-y-auto md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative w-full max-w-2xl max-h-full">
        <div class="relative bg-white rounded-2xl shadow-xl border border-gray-100">

            <div class="flex items-center justify-between p-6 border-b border-gray-100">
                <h3 class="text-xl font-bold text-gray-800">Editar Material: {{ mp.nombre }}</h3>
                <button type="button" data-modal-hide="modal-edit-mp-{{ mp.id_mp }}" class="text-gray-400 hover:text-gray-900 transition-colors">
                    <i class="bi bi-x-lg text-lg"></i>
                </button>
            </div>

            <form action="{{ url_for('admin.materiales_update') }}" method="POST" class="p-8 text-left">
                <input type="hidden" name="id_mp" value="{{ mp.id_mp }}">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Nombre *</label>
                        <input type="text" name="nombre" value="{{ mp.nombre }}" required
                               class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Unidad de Medida *</label>
                        <select name="unidad_medida" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                            <option value="Gramos" {% if mp.unidad_medida == 'Gramos' %}selected{% endif %}>Gramos</option>
                            <option value="Metros" {% if mp.unidad_medida == 'Metros' %}selected{% endif %}>Metros</option>
                            <option value="Piezas" {% if mp.unidad_medida == 'Piezas' %}selected{% endif %}>Piezas</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Stock Actual</label>
                        <input type="number" step="0.01" name="stock_actual" value="{{ mp.stock_actual }}"
                               class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Stock Mínimo</label>
                        <input type="number" step="0.01" name="stock_minimo" value="{{ mp.stock_minimo }}"
                               class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">% Merma</label>
                        <input type="number" step="0.01" name="porcentaje_merma" value="{{ mp.porcentaje_merma }}"
                               class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-gray-700">Costo Unitario</label>
                        <input type="number" step="0.01" name="costo_unitario" value="{{ mp.costo_unitario }}"
                               class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#0f4b5b] outline-none">
                    </div>
                </div>

                <div class="flex justify-end gap-4 mt-10">
                    <button type="button" data-modal-hide="modal-edit-mp-{{ mp.id_mp }}" class="px-6 py-2.5 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-xl transition-colors">Cancelar</button>
                    <button type="submit" class="px-8 py-2.5 bg-[#0f4b5b] text-white text-sm font-bold rounded-xl shadow-md hover:bg-[#0a3844] transition-colors">
                        Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
