<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGECA | {% block title %}Shop{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
     <link
      rel="stylesheet"
      href="{{ url_for('static', filename='dist/output.css') }}"
    />

</head>
<body class="bg-gray-50">

    <nav class="bg-[#4a2c2a] border-gray-200 dark:bg-gray-900">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="/" class="flex items-center space-x-3 rtl:space-x-reverse text-white">
                <span class="self-center text-2xl font-semibold whitespace-nowrap">SIGECA</span>
            </a>
            <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse text-white">
                <ul class="flex font-medium space-x-8">
                    <li><a href="#" class="hover:underline">Tienda</a></li>
                    <li class="relative">
                        <a href="#" class="flex items-center hover:underline">
                            <i class="bi bi-cart3 text-xl"></i>
                           <span class="ml-1 bg-cyan-600 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">2</span>
                        </a>
                    </li>
                    <li><a href="{{ url_for('auth.login_page') }}" class="hover:underline">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="max-w-screen-xl mx-auto p-4 mt-6">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
    <script src="{{ url_for('static', filename='scripts/layout_admin.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
